name: core

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    networks:
      proxy:
        aliases:
          - id.lbanks.dev
          - oauth.lbanks.dev
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /home/lach/configs/traefik:/etc/traefik
    restart: unless-stopped

  coredns:
    image: coredns/coredns:1.14.3
    container_name: coredns
    network_mode: host
    command: -conf /etc/coredns/Corefile
    volumes:
      - /home/lach/configs/coredns:/etc/coredns
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - proxy

  beszel-agent:
    image: henrygd/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/lach/configs/beszel-agent:/var/lib/beszel-agent
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    environment:
      LISTEN: ${BESZEL_LISTEN}
      KEY: ${BESZEL_KEY}
      TOKEN: ${BESZEL_TOKEN}
      HUB_URL: ${BESZEL_HUB_URL}

  beszel:
    image: henrygd/beszel:0.18.7
    container_name: beszel
    ports:
      - "8090:8090"
    env_file:
      - /home/lach/configs/beszel/.env
    volumes:
      - /home/lach/configs/beszel:/beszel_data
    restart: unless-stopped
    networks:
      - proxy

  archisteamfarm:
    image: justarchi/archisteamfarm:6.3.5.1
    container_name: asf
    environment:
      - ASF_CRYPTKEY=${ASF_CRYPTKEY}
    volumes:
      - /home/lach/configs/asf:/app/config
      - /home/lach/configs/asf/logs:/app/logs
    restart: unless-stopped
    networks:
      - proxy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.8.0
    container_name: pocket-id
    env_file:
      - /home/lach/configs/pocket-id/.env
    volumes:
      - /home/lach/configs/pocket-id:/app/data
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: [CMD, /app/pocket-id, healthcheck]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - /home/lach/configs/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    networks:
      - proxy

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
    container_name: oauth2-proxy
    env_file:
      - /home/lach/configs/oauth2-proxy/.env
    ports:
      - "4180:4180"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - proxy

  backup:
    image: lachlan443/backblaze-backup:1.2.0
    container_name: backup
    environment:
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/backup:/config
      - /home/lach/backups:/backups
      - /home/lach:/source:ro
    restart: unless-stopped

networks:
  proxy:
    name: proxy
