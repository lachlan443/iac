name: core

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    networks:
      - proxy
      - media
      - llm
      - supabase
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /home/lach/configs/traefik:/etc/traefik
    restart: unless-stopped

  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:latest
    container_name: tinyauth
    networks:
      - proxy
    environment:
      - APP_URL=${TINYAUTH_APP_URL}
      - SECRET=${TINYAUTH_SECRET}
      - USERS=${TINYAUTH_USERS}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    container_name: cloudflared
    networks:
      - proxy
    environment:
      - TZ=${TZ}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped

  beszel-agent:
    image: henrygd/beszel-agent:0.18.7-alpine
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/lach/configs/beszel-agent:/var/lib/beszel-agent
      - /data/.beszel:/extra-filesystems/sda1__Media:ro
    devices:
      - /dev/sda:/dev/sda
      - /dev/nvme0:/dev/nvme0
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    entrypoint: ["/bin/sh", "-c", "sleep 60 && exec /agent"]
    environment:
      LISTEN: ${BESZEL_LISTEN}
      KEY: ${BESZEL_KEY}
      TOKEN: ${BESZEL_TOKEN}
      HUB_URL: ${BESZEL_HUB_URL}

  backup:
    image: lachlan443/backblaze-backup:1.2.0
    container_name: backup
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /home/lach/configs/backup:/config
      - /home/lach/backups:/backups
      - /home/lach:/source:ro
    restart: unless-stopped

  renovate:
    image: renovate/renovate:latest
    container_name: renovate
    environment:
      - RENOVATE_PLATFORM=${RENOVATE_PLATFORM}
      - RENOVATE_REPOSITORIES=${RENOVATE_REPOSITORIES}
      - RENOVATE_ONBOARDING=${RENOVATE_ONBOARDING}
      - RENOVATE_REQUIRE_CONFIG=${RENOVATE_REQUIRE_CONFIG}
      - LOG_LEVEL=${RENOVATE_LOG_LEVEL}
      - RENOVATE_USERNAME=${RENOVATE_USERNAME}
      - RENOVATE_GIT_AUTHOR=${RENOVATE_GIT_AUTHOR}
      - RENOVATE_GITHUB_APP_ID=${RENOVATE_GITHUB_APP_ID}
      - RENOVATE_GITHUB_APP_KEY=${RENOVATE_GITHUB_APP_KEY}
    volumes:
      - /home/lach/configs/renovate:/config
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    restart: unless-stopped

  habits:
    image: lachlan443/habits:2.3.0
    container_name: habits
    networks:
      - proxy
    volumes:
      - /home/lach/configs/habits:/config
    restart: unless-stopped

  trilium:
    image: triliumnext/trilium:v0.103.0
    container_name: trilium
    networks:
      - proxy
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
      - TRILIUM_TRUSTED_REVERSE_PROXY=true
    volumes:
      - /home/lach/configs/trilium:/home/node/trilium-data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

networks:
  proxy:
    name: proxy
  media:
    name: media
  llm:
    name: llm
  supabase:
    name: supabase
