name: media

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/sonarr:/config
      - /data:/data
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: radarr
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/radarr:/config
      - /data:/data
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/prowlarr2:/config
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.0
    container_name: qbittorrent
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT}
      - TORRENTING_PORT=${QBITTORRENT_TORRENTING_PORT}
    volumes:
      - /home/lach/configs/qBittorrent:/config
      - /data/torrents:/data/torrents:rw
    ports:
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.3
    container_name: sabnzbd
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/SABnzbd:/config
      - /data/usenet:/data/usenet:rw
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.6.0
    container_name: recyclarr
    user: 1000:1000
    networks:
      - media
    volumes:
      - /home/lach/configs/recyclarr:/config
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  kometa:
    image: kometateam/kometa:v2.3.1
    container_name: kometa
    networks:
      - media
    environment:
      - PMM_CONFIG=${KOMETA_PMM_CONFIG}
      - KOMETA_TIME=${KOMETA_TIME}
      - PLEX_UID=${PLEX_UID}
      - PLEX_GID=${PLEX_GID}
      - KOMETA_RUN=${KOMETA_RUN}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/kometa:/config
    restart: unless-stopped

  disk-stats:
    build: /home/lach/projects/kometa-disk-usage
    container_name: kometa-sidecar-disk-stats
    environment:
      - TZ=${TZ}
      - KOMETA_TIME=${DISK_STATS_SCHEDULE}
      - DATA_PATH=/data
      - MOVIES_PATH=/data/media/movies
      - TV_PATH=/data/media/tv
    volumes:
      - /home/lach/configs/kometa:/config
      - /data:/data:ro
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:1.43.2
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=${PLEX_VERSION}
    volumes:
      - /home/lach/configs/plex:/config
      - /data/media/tv:/tv
      - /data/media/movies:/movies
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  flaresolverr:
    image: flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    networks:
      - media
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:2.9.13
    container_name: cleanuparr
    networks:
      - media
    environment:
      - PORT=${CLEANUPARR_PORT}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${CLEANUPARR_UMASK}
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/cleanuparr:/config
    restart: unless-stopped

  pulsarr:
    image: lakker/pulsarr:0.15.5
    container_name: pulsarr
    networks:
      - media
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - baseUrl=${PULSARR_BASE_URL}
      - port=${PULSARR_PORT}
      - logLevel=${PULSARR_LOG_LEVEL}
      - NODE_ARGS=${PULSARR_NODE_ARGS}
    volumes:
      - /home/lach/configs/pulsarr:/app/data
    restart: unless-stopped

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:3.11.1
    container_name: maintainerr
    user: 1000:1000
    networks:
      - media
    environment:
      - TZ=${TZ}
    volumes:
      - /home/lach/configs/maintainerr:/opt/data
    restart: unless-stopped

  logline:
    build: /home/lach/projects/logline
    container_name: logline
    networks:
      - media
    env_file:
      - .env
    volumes:
      - /home/lach/configs/logline:/config
    restart: unless-stopped

networks:
  media:
    name: media
    external: true
