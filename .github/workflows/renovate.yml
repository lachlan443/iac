name: Renovate

on:
  workflow_dispatch:

jobs:
  renovate:
    name: Trigger Renovate run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Renovate image
        id: image
        run: |
          IMAGE=$(grep 'image: renovate/renovate' docker/compose.yaml | awk '{print $2}')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Mask token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@ubuntu \
            "docker run --rm \
              -e RENOVATE_TOKEN='${RENOVATE_TOKEN}' \
              -e RENOVATE_PLATFORM=github \
              -e RENOVATE_REPOSITORIES=lachlan443/iac \
              -e RENOVATE_ONBOARDING=false \
              -e RENOVATE_REQUIRE_CONFIG=optional \
              -e RENOVATE_USERNAME='lachlan443-renovate[bot]' \
              -e RENOVATE_GIT_AUTHOR='lachlan443-renovate[bot] <265741650+lachlan443-renovate[bot]@users.noreply.github.com>' \
              -e LOG_LEVEL=info \
              ${{ steps.image.outputs.image }}"
