name: Renovate

on:
  workflow_dispatch:

jobs:
  renovate:
    name: Trigger Renovate run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Renovate image
        id: image
        run: echo "image=$(grep 'image: renovate/renovate' docker/compose.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_PRIVATE_KEY: op://homelab/CI SSH Key/private key?ssh-format=openssh
          TS_OAUTH_CLIENT_ID: op://homelab/Tailscale OAuth/username
          TS_OAUTH_CLIENT_SECRET: op://homelab/Tailscale OAuth/password
          RENOVATE_APP_ID: op://homelab/Renovate GitHub App/app-id
          RENOVATE_APP_PRIVATE_KEY: op://homelab/Renovate GitHub App/private-key

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RENOVATE_APP_ID }}
          private-key: ${{ env.RENOVATE_APP_PRIVATE_KEY }}

      - name: Mask token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@ubuntu \
            "docker run --rm \
              -e RENOVATE_TOKEN='${RENOVATE_TOKEN}' \
              -e RENOVATE_PLATFORM=github \
              -e RENOVATE_REPOSITORIES=lachlan443/iac \
              -e RENOVATE_ONBOARDING=false \
              -e RENOVATE_REQUIRE_CONFIG=optional \
              -e RENOVATE_USERNAME='lachlan443-renovate[bot]' \
              -e RENOVATE_GIT_AUTHOR='lachlan443-renovate[bot] <265741650+lachlan443-renovate[bot]@users.noreply.github.com>' \
              -e LOG_LEVEL=info \
              ${{ steps.image.outputs.image }}"
