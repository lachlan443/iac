name: Docker Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker/compose.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_PRIVATE_KEY: op://homelab/CI SSH Key/private key
          TS_OAUTH_CLIENT_ID: op://homelab/Tailscale OAuth/username
          TS_OAUTH_CLIENT_SECRET: op://homelab/Tailscale OAuth/password

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@ubuntu \
            "cd /home/lach/iac && git pull && cd docker && docker compose pull && docker compose up -d && docker image prune -f"
