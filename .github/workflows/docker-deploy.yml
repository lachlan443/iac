name: Docker Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker/compose.yaml'

  workflow_dispatch:

concurrency:
  group: docker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync files
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@ubuntu "mkdir -p /home/lach/docker"
          rsync -az docker/compose.yaml lach@ubuntu:/home/lach/docker/

      - name: Pull images
        run: ssh lach@ubuntu "docker compose -f /home/lach/docker/compose.yaml pull"

      - name: Deploy
        run: ssh lach@ubuntu "docker compose -f /home/lach/docker/compose.yaml up -d"

      - name: Prune unused images
        run: ssh lach@ubuntu "docker image prune -a -f"
