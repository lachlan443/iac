name: Docker Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sweet: ${{ steps.filter.outputs.sweet }}
      sweet_llm: ${{ steps.filter.outputs.sweet_llm }}
      sour: ${{ steps.filter.outputs.sour }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sweet:
              - 'docker/sweet/compose.yaml'
            sweet_llm:
              - 'docker/sweet/llm-compose.yaml'
            sour:
              - 'docker/sour/**'

  deploy-sweet:
    name: Deploy to sweet
    needs: changes
    if: needs.changes.outputs.sweet == 'true' || needs.changes.outputs.sweet_llm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-sweet
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync compose
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@sweet "mkdir -p /home/lach/docker"
          rsync -az docker/sweet/compose.yaml lach@sweet:/home/lach/docker/compose.yaml
          rsync -az docker/sweet/llm-compose.yaml lach@sweet:/home/lach/docker/llm-compose.yaml

      - name: Pull images
        run: |
          ssh lach@sweet "docker compose -f /home/lach/docker/compose.yaml pull"
          ssh lach@sweet "docker compose -f /home/lach/docker/llm-compose.yaml pull"

      - name: Deploy
        run: |
          ssh lach@sweet "docker compose -f /home/lach/docker/compose.yaml up -d --remove-orphans"
          ssh lach@sweet "docker compose -f /home/lach/docker/llm-compose.yaml up -d --remove-orphans"

      - name: Prune unused images
        run: ssh lach@sweet "docker image prune -a -f"

  deploy-sour:
    name: Deploy to sour
    needs: changes
    if: needs.changes.outputs.sour == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-sour
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync compose
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@sour "mkdir -p /home/lach/docker"
          rsync -az docker/sour/compose.yaml lach@sour:/home/lach/docker/compose.yaml

      - name: Pull images
        run: ssh lach@sour "docker compose -f /home/lach/docker/compose.yaml pull"

      - name: Deploy
        run: ssh lach@sour "docker compose -f /home/lach/docker/compose.yaml up -d --remove-orphans"

      - name: Prune unused images
        run: ssh lach@sour "docker image prune -a -f"
