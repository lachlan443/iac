name: Docker Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker/compose.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to home server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_PRIVATE_KEY: op://homelab/CI SSH Key/private key?ssh-format=openssh
          TS_OAUTH_CLIENT_ID: op://homelab/Tailscale OAuth/username
          TS_OAUTH_CLIENT_SECRET: op://homelab/Tailscale OAuth/password

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Rsync compose file
        run: |
          ssh -o StrictHostKeyChecking=accept-new lach@ubuntu "mkdir -p /home/lach/docker"
          rsync -az docker/compose.yaml lach@ubuntu:/home/lach/docker/compose.yaml

      - name: Deploy
        run: |
          ssh lach@ubuntu \
            "docker compose -f /home/lach/docker/compose.yaml pull && \
             docker compose -f /home/lach/docker/compose.yaml up -d && \
             docker image prune -f"
